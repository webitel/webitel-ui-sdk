name: webitel ui-datalist pkg publish

on:
#  https://docs.github.com/en/actions/managing-workflow-runs-and-deployments/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:

jobs:
  publish:
    permissions:
      id-token: write  # Required for OIDC, https://docs.npmjs.com/trusted-publishers#github-actions-configuration
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Publish release
        id: publish_release
        run: |
          cd packages/ui-datalist
          npm ci
          npm version patch --git-tag-version false
          npm run lint:fix || true
          (npm run build:types || true)
          npm run lint:package
          npm run utils:publish

      # Commit all changed files back to the repository
      - uses: stefanzweifel/git-auto-commit-action@v5
